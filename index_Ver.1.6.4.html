<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f5738">
<title>メダカ塾パークゴルフ Ver.1.6.4</title>
<style>
:root{--g:#0f5738;--g2:#083522;--gold:#e7c75a;--cream:#fff9e8;--line:#91a298;--muted:#60766b;--red:#d01835}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic UI","Meiryo",sans-serif;background:#eef4ef;color:#173325}
button,input{font:inherit}
button{cursor:pointer}
.screen{display:none;min-height:100dvh}.screen.active{display:block}
.home{max-width:480px;margin:auto;padding:12px}
.hero{background:linear-gradient(160deg,#237448,#0d482f);color:white;border-radius:22px;padding:14px 14px 16px;text-align:center;box-shadow:0 8px 24px #0003}
.hero h1{font-size:27px;line-height:1.2;margin:0 0 8px}
.logo{width:145px;height:125px;margin:5px auto 0;display:flex;align-items:center;justify-content:center;background:transparent;border:0;overflow:visible}
.logo img{display:block;width:100%;height:100%;object-fit:contain;object-position:center;background:transparent}
.tag{margin-top:7px;color:#ffe99a;font-size:13px;font-weight:900}
.homeMenu{display:grid;gap:9px;margin-top:11px}
.homeBtn{width:100%;border:0;border-radius:16px;min-height:57px;padding:10px 14px;background:white;color:#17452f;font-size:18px;font-weight:900;box-shadow:0 4px 12px #0002;text-align:left;display:flex;align-items:center;justify-content:space-between}
.homeBtn .arrow{color:#7e9588;font-size:22px}
.homeBtn.player{background:#fff6d7;border:2px solid #e1c75f}
.selectedSummary{background:#ffffffd9;border-radius:13px;padding:8px 10px;margin-top:8px;text-align:left;font-size:13px;color:#355c47}
header{position:sticky;top:0;z-index:20;background:var(--g);color:white;padding:7px 8px;display:flex;align-items:center;gap:6px}
header h2{font-size:17px;margin:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topBtn{border:0;border-radius:9px;padding:8px 9px;background:white;color:var(--g);font-weight:900}
.wrap{max-width:900px;margin:auto;padding:7px}
.panel{background:white;border-radius:14px;padding:9px;margin-bottom:7px;box-shadow:0 2px 9px #0001}
.panelTitle{font-size:19px;font-weight:900;margin:0 0 8px}
.searchRow{display:grid;grid-template-columns:1fr auto;gap:7px;margin-bottom:8px}
.searchRow input,.addRow input{width:100%;padding:10px;border:1px solid #b9c8bf;border-radius:10px;font-size:16px}
.searchRow button,.addRow button{border:0;border-radius:10px;padding:9px 13px;background:var(--g);color:white;font-weight:900}
.kanaBtns{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.kanaBtns button{border:1px solid #c7d5cc;border-radius:9px;background:#edf4ef;color:#24563c;padding:7px 2px;font-size:13px;font-weight:900}
.kanaBtns button.active{background:var(--g);color:white}
.playerList{display:grid;gap:6px}
.playerRow{display:grid;grid-template-columns:34px 1fr 42px;align-items:center;gap:7px;background:#f8fbf9;border:1px solid #d1ded6;border-radius:12px;padding:8px}
.playerRow input[type=checkbox]{width:23px;height:23px}
.playerRow .name{font-size:17px;font-weight:900}
.playerRow .del{border:0;border-radius:9px;background:#ffe2e6;color:#9f0018;padding:7px;font-weight:900}
.addRow{display:grid;grid-template-columns:1fr auto;gap:7px;margin-top:9px}
.count{font-size:13px;color:var(--muted);margin-bottom:7px}
.courseBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.courseBtns button{padding:7px 2px;border:1px solid #c5d4ca;border-radius:9px;background:#eef5f0;color:#125d3c;font-size:12px;font-weight:900}
.courseBtns button.active{background:#125d3c;color:white}
table{width:100%;border-collapse:collapse;table-layout:fixed;background:white}
th,td{border:1px solid var(--line);text-align:center;height:39px;padding:2px}
th{background:#e7f0ea;font-size:11px}
th:nth-child(1),td:nth-child(1){width:9%}
th:nth-child(2),td:nth-child(2){width:9%}
th:nth-child(3),td:nth-child(3){width:12%}
th:nth-child(n+4),td:nth-child(n+4){width:17.5%}
th.playerName{font-size:12px;line-height:1.1;word-break:break-all}
td.score{font-size:22px;font-weight:900;background:#fffdf4}
td.score.filled{background:#fff0bd}
td.score.birdie{color:var(--red)}
td.score.current{outline:4px solid #ff8a00;outline-offset:-4px}
.total td{background:#e7f0ea;font-weight:900}
.bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
.bottom button{border:0;border-radius:9px;padding:9px;background:#dce9df;color:#124d34;font-weight:900}
.bottom .save{background:var(--g);color:white}
.modal{position:fixed;inset:0;background:#0004;display:none;z-index:100}
.modal.show{display:block}
.pad{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:min(450px,96vw);background:white;border:3px solid var(--g);border-radius:17px;padding:10px}
.padTitle{text-align:center;font-weight:900;margin-bottom:8px}
.padGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.padGrid button{height:50px;border:0;border-radius:10px;background:#edf4ef;font-size:20px;font-weight:900}
.padGrid .all{background:#ffe6a0}.padGrid .move{background:#dce8ff}.padGrid .close{background:#ffe0e5;color:#a00018}
.listItem{background:white;border:1px solid #cfddd4;border-radius:10px;padding:9px;margin:7px 0}
.notice{padding:11px;border-radius:12px;background:#fff6d7;color:#654f00;font-weight:900}
@media(max-height:740px){th,td{height:34px}.wrap{padding:4px}.panel{padding:6px;margin-bottom:5px}.courseBtns button{padding:5px 2px}}
</style>
</head>

<script>
const COURSE_DATA={"蓮沼パークゴルフ場": {"のぎく": {"par": [4, 4, 3, 3, 4, 3, 3, 3, 5], "dist": [44, 73, 40, 27, 54, 32, 35, 29, 71]}, "ききょう": {"par": [3, 5, 3, 3, 4, 3, 4, 3, 5], "dist": [34, 48, 34, 36, 52, 25, 44, 31, 92]}, "ひまわり": {"par": [4, 3, 4, 4, 3, 4, 3, 4, 4], "dist": [45, 35, 52, 60, 32, 55, 38, 64, 54]}, "やまゆり": {"par": [4, 3, 3, 4, 4, 3, 4, 4, 4], "dist": [48, 32, 36, 58, 62, 30, 52, 66, 50]}}, "橘ふれあい公園パークゴルフ場": {"いぶき": {"par": [5, 4, 4, 3, 3, 3, 3, 4, 4], "dist": [100, 42, 43, 35, 25, 30, 30, 41, 54]}, "さつき": {"par": [4, 4, 3, 3, 3, 4, 4, 3, 5], "dist": [52, 42, 25, 37, 30, 45, 42, 27, 100]}, "やまゆり": {"par": [4, 3, 3, 3, 4, 4, 3, 4, 5], "dist": [66, 40, 38, 40, 44, 72, 40, 60, 100]}, "あやめ": {"par": [5, 3, 3, 3, 4, 4, 4, 3, 4], "dist": [100, 30, 40, 40, 55, 45, 72, 40, 78]}}, "佐倉グリーンパーク": {"さくら（A）": {"par": [3, 3, 5, 4, 3, 3, 4, 4, 4], "dist": [32, 43, 100, 60, 35, 40, 60, 50, 66]}, "ツツジ（B）": {"par": [3, 4, 4, 4, 3, 3, 4, 5, 3], "dist": [40, 67, 82, 56, 38, 35, 55, 100, 37]}, "モミジ（C）": {"par": [4, 4, 3, 3, 3, 4, 5, 4, 3], "dist": [82, 60, 40, 42, 37, 50, 100, 75, 34]}, "サツキ（D）": {"par": [4, 4, 3, 3, 4, 4, 4, 3, 4], "dist": [50, 60, 36, 35, 70, 65, 50, 38, 55]}}, "エコパーク大木戸": {"風だまり（A）": {"par": [5, 3, 3, 4, 3, 4, 4, 4, 3], "dist": [100, 40, 29, 80, 35, 48, 52, 66, 40]}, "わかば（B）": {"par": [4, 3, 3, 3, 4, 5, 3, 4, 4], "dist": [65, 40, 40, 40, 70, 65, 36, 56, 68]}, "そよ風（C）": {"par": [4, 3, 4, 4, 4, 3, 4, 4, 3], "dist": [41, 32, 59, 73, 41, 25, 65, 49, 35]}, "せせらぎ（D）": {"par": [5, 3, 4, 4, 3, 3, 4, 3, 4], "dist": [100, 37, 45, 42, 30, 40, 51, 32, 73]}}};
const KEY='medaka_juku_pg_v163';
let state=loadState();
if(Array.isArray(state.players) && state.players.length && typeof state.players[0]==='string'){
 state.players=state.players.map(name=>({name:name,kana:''}));
}
if(!Array.isArray(state.players))state.players=[];
state.players=state.players.map(p=>typeof p==='string'?{name:p,kana:'',sex:'',birth:''}:{name:p.name||'',kana:p.kana||'',sex:p.sex||'',birth:p.birth||''});
if(!Array.isArray(state.selected))state.selected=[];
let current={hole:0,player:0};
let kanaFilter='すべて';

function defaultState(){
 const place=Object.keys(COURSE_DATA)[0],course=Object.keys(COURSE_DATA[place])[0];
 return {
  players:[
   {name:'kazu',kana:'かず',sex:'男',birth:''},
   {name:'柳澤 栄三郎',kana:'やなぎさわえいざぶろう',sex:'男',birth:''},
   {name:'今井 美代',kana:'いまいみよ',sex:'女',birth:''},
   {name:'鈴木 政枝',kana:'すずきまさえ',sex:'女',birth:''},
   {name:'竹内 正直',kana:'たけうちまさなお',sex:'男',birth:''},
   {name:'星野 幹男',kana:'ほしのみきお',sex:'男',birth:''}
  ],
  selected:[],
  place,course,
  scores:{},
  history:[]
 };
}
function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||defaultState()}catch(e){return defaultState()}}
function saveState(){localStorage.setItem(KEY,JSON.stringify(state))}
function scoreKey(){return state.place+'__'+state.course}
function getScores(){const k=scoreKey();if(!state.scores[k])state.scores[k]=Array.from({length:9},()=>[null,null,null,null]);return state.scores[k]}
function setScores(v){state.scores[scoreKey()]=v}
function names(){
 const arr=[...state.selected];
 while(arr.length<4)arr.push('―');
 return arr.slice(0,4);
}
function init(){
 renderHome();
 renderKana();
 renderPlayers();
}
function renderHome(){}
function showHome(){hideAll();homeScreen.classList.add('active');renderHome()}
function showPlayers(){hideAll();playersScreen.classList.add('active');renderPlayers()}
function showScore(){hideAll();scoreScreen.classList.add('active');renderScore()}
function showHistory(){hideAll();historyScreen.classList.add('active');renderHistory()}
function hideAll(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))}
function confirmPlayers(){if(state.selected.length===0){alert('プレイヤーを選んでください');return}showHome()}
function selectPlace(place){
 if(state.selected.length===0){alert('先にプレイヤーを選択してください');return}
 state.place=place;
 state.course=Object.keys(COURSE_DATA[place])[0];
 saveState();showScore();
}
function renderKana(){
 const ks=['すべて','あ','か','さ','た','な','は','ま','や','ら','わ'];
 kanaBtns.innerHTML=ks.map(k=>`<button class="${k===kanaFilter?'active':''}" onclick="setKana('${k}')">${k}</button>`).join('');
}
function setKana(k){kanaFilter=k;renderKana();renderPlayers()}
function kanaGroup(kana){
 const c=(kana||'').replace(/\s/g,'')[0]||'';
 if('あいうえおぁぃぅぇぉ'.includes(c))return'あ';
 if('かきくけこがぎぐげご'.includes(c))return'か';
 if('さしすせそざじずぜぞ'.includes(c))return'さ';
 if('たちつてとだぢづでど'.includes(c))return'た';
 if('なにぬねの'.includes(c))return'な';
 if('はひふへほばびぶべぼぱぴぷぺぽ'.includes(c))return'は';
 if('まみむめも'.includes(c))return'ま';
 if('やゆよゃゅょ'.includes(c))return'や';
 if('らりるれろ'.includes(c))return'ら';
 return'わ';
}
function renderPlayers(){
 const q=(search.value||'').trim().toLowerCase().replace(/\s/g,'');
 const list=state.players
  .map((p,i)=>({p:p,i:i}))
  .filter(x=>{
    const name=(x.p.name||'').toLowerCase().replace(/\s/g,'');
    const kana=(x.p.kana||'').toLowerCase().replace(/\s/g,'');
    return (!q||name.includes(q)||kana.includes(q)) &&
           (kanaFilter==='すべて'||kanaGroup(kana)===kanaFilter);
  })
  .sort((a,b)=>(a.p.kana||a.p.name).localeCompare((b.p.kana||b.p.name),'ja'));
 playerList.innerHTML=list.map(x=>{
  const checked=state.selected.includes(x.p.name);
  return `<div class="playerRow">
    <input type="checkbox" ${checked?'checked':''} onchange="togglePlayer('${escAttr(x.p.name)}',this.checked)">
    <div><div class="name">${esc(x.p.name)}</div><div class="reading">${esc(x.p.kana||'ふりがな未登録')}</div><div class="meta">${esc(x.p.sex||'')}${x.p.birth?'・'+esc(x.p.birth):''}</div></div>
    <button class="del" onclick="deletePlayer('${escAttr(x.p.name)}')">削除</button>
  </div>`;
 }).join('')||'<div class="notice">該当する名前がありません</div>';
 count.textContent=`選択中 ${state.selected.length}人／4人　登録 ${state.players.length}人`;
}
function togglePlayer(name,on){
 if(on){
  if(state.selected.length>=4){alert('選べるのは4人までです');renderPlayers();return}
  if(!state.selected.includes(name))state.selected.push(name);
 }else state.selected=state.selected.filter(x=>x!==name);
 saveState();renderPlayers();renderHome();
}
function addPlayer(){
 const name=newName.value.trim();
 const kana=newKana.value.trim().replace(/\s/g,'');
 const sex=newSex.value;
 const birth=newBirth.value;
 if(!name){alert('氏名を入力してください');return}
 if(!kana){alert('ふりがなを入力してください');return}
 if(state.players.some(p=>p.name===name)){alert('この名前は既に登録済みです');return}
 state.players.push({name:name,kana:kana,sex:sex,birth:birth});
 newName.value='';newKana.value='';newBirth.value='';
 saveState();renderPlayers();
}
function deletePlayer(name){
 if(!confirm(name+' を削除しますか？'))return;
 state.players=state.players.filter(p=>p.name!==name);
 state.selected=state.selected.filter(x=>x!==name);
 saveState();renderPlayers();renderHome();
}
function clearSearch(){search.value='';kanaFilter='すべて';renderKana();renderPlayers()}
function changeCourse(course){state.course=course;saveState();renderScore()}
function renderPlayerOrder(){
 const ns=names();
 playerOrderBtns.innerHTML=ns.map((name,i)=>`
   <div class="orderCell">
     <button onclick="movePlayer(${i},-1)" ${i===0?'disabled':''}>◀</button>
     <div class="orderName">${esc(name)}</div>
     <button onclick="movePlayer(${i},1)" ${i===3?'disabled':''}>▶</button>
   </div>`).join('');
}
function movePlayer(index,dir){
 const target=index+dir;
 if(target<0||target>3)return;
 const selected=[...state.selected];
 while(selected.length<4)selected.push('―');
 [selected[index],selected[target]]=[selected[target],selected[index]];
 state.selected=selected.filter(n=>n&&n!=='―');

 Object.keys(COURSE_DATA[state.place]).forEach(course=>{
   const key=state.place+'__'+course;
   if(!state.scores[key])return;
   state.scores[key].forEach(row=>{
     [row[index],row[target]]=[row[target],row[index]];
   });
 });

 saveState();
 renderScore();
}
function renderScore(){
 renderPlayerOrder();
 const courses=Object.keys(COURSE_DATA[state.place]);
 courseBtns.innerHTML=courses.map(c=>`<button class="${c===state.course?'active':''}" onclick="changeCourse('${c}')">${c}</button>`).join('');
 headTitle.textContent=state.place+'・'+state.course;
 const d=COURSE_DATA[state.place][state.course],scores=getScores(),ns=names();
 let h='<tr><th>H</th><th>Par</th><th>距離</th>'+ns.map(n=>`<th class="playerName">${esc(n)}</th>`).join('')+'</tr>';
 for(let i=0;i<9;i++){
  h+=`<tr><td>${i+1}</td><td>${d.par[i]}</td><td>${d.dist[i]}</td>`;
  for(let p=0;p<4;p++){
   const v=scores[i][p],cls=['score'];
   if(v!=null)cls.push('filled');
   if(v!=null&&v===d.par[i]-1)cls.push('birdie');
   if(i===current.hole&&p===current.player)cls.push('current');
   h+=`<td class="${cls.join(' ')}" onclick="openPad(${i},${p})">${v??''}</td>`;
  }
  h+='</tr>';
 }
 h+='<tr class="total"><td>計</td><td>'+d.par.reduce((a,b)=>a+b,0)+'</td><td>'+d.dist.reduce((a,b)=>a+b,0)+'</td>';
 for(let p=0;p<4;p++)h+=`<td>${scores.reduce((s,r)=>s+(r[p]||0),0)}</td>`;
 h+='</tr>';
 scoreTable.innerHTML=h;
 renderCourseTotals();
}
function renderCourseTotals(){
 const ns=names();
 const courses=Object.keys(COURSE_DATA[state.place]);
 let rows=[];
 let grand=[0,0,0,0];

 courses.forEach(course=>{
   const key=state.place+'__'+course;
   const scores=state.scores[key]||Array.from({length:9},()=>[null,null,null,null]);
   const totals=[0,1,2,3].map(p=>scores.reduce((sum,row)=>sum+(Number(row[p])||0),0));
   totals.forEach((v,i)=>grand[i]+=v);
   rows.push(`<tr><td>${esc(course)} 計</td>${totals.map(v=>`<td>${v}</td>`).join('')}</tr>`);
 });

 courseTotals.innerHTML=`<table>
   <colgroup>
     <col class="labelCol">
     <col class="playerCol"><col class="playerCol"><col class="playerCol"><col class="playerCol">
   </colgroup>
   <tr><th>コース</th>${ns.map(n=>`<th>${esc(n)}</th>`).join('')}</tr>
   ${rows.join('')}
   <tr class="grand"><td>総合計</td>${grand.map(v=>`<td>${v}</td>`).join('')}</tr>
 </table>`;
}
function openPad(h,p){current={hole:h,player:p};padTitle.textContent=`${names()[p]}・${h+1}H`;modal.classList.add('show');renderScore()}
function closePad(){modal.classList.remove('show')}
function setScore(n){const s=getScores();s[current.hole][current.player]=n;setScores(s);advance();saveState();renderScore();padTitle.textContent=`${names()[current.player]}・${current.hole+1}H`}
function adjust(n){const s=getScores();let v=s[current.hole][current.player]??0;s[current.hole][current.player]=Math.max(0,v+n);setScores(s);saveState();renderScore()}
function setAll(n){const s=getScores();for(let p=0;p<4;p++)s[current.hole][p]=n;setScores(s);saveState();renderScore()}
function clearCell(){const s=getScores();s[current.hole][current.player]=null;setScores(s);saveState();renderScore()}
function advance(){if(current.player<3)current.player++;else if(current.hole<8){current.hole++;current.player=0}}
function move(dir){let idx=current.hole*4+current.player+dir;idx=Math.max(0,Math.min(35,idx));current.hole=Math.floor(idx/4);current.player=idx%4;padTitle.textContent=`${names()[current.player]}・${current.hole+1}H`;renderScore()}
function clearScores(){if(confirm('このコースのスコアを全部消しますか？')){setScores(Array.from({length:9},()=>[null,null,null,null]));saveState();renderScore()}}
function newRound(){if(confirm('新しいラウンドを始めますか？')){setScores(Array.from({length:9},()=>[null,null,null,null]));saveState();renderScore()}}
function saveRound(){
 const d=COURSE_DATA[state.place][state.course],scores=JSON.parse(JSON.stringify(getScores()));
 state.history.unshift({id:Date.now(),date:new Date().toISOString().slice(0,10),place:state.place,course:state.course,names:names(),scores,par:[...d.par],dist:[...d.dist]});
 saveState();alert('保存しました');
}
function renderHistory(){
 const a=monthlyAnalysis();
 monthSummary.innerHTML=`今月の保存 <b>${a.count}</b>件　平均 <b>${a.avg}</b>　ベスト <b>${a.best}</b>`;
 if(!state.history.length){historyList.innerHTML='<div class="listItem">まだ保存データはありません。</div>';return}
 historyList.innerHTML=state.history.map(r=>{
  const totals=[0,1,2,3].map(p=>r.scores.reduce((s,row)=>s+(row[p]||0),0));
  return `<div class="listItem"><b>${r.date}　${esc(r.place)}／${esc(r.course)}</b><br>${r.names.map((n,i)=>esc(n)+':'+totals[i]).join('　')}
    <div class="historyActions"><button class="load" onclick="loadHistory(${r.id})">呼び出す</button><button class="del" onclick="deleteHistory(${r.id})">削除</button></div></div>`;
 }).join('');
}

function loadHistory(id){
 const r=state.history.find(x=>x.id===id);
 if(!r)return;
 state.place=r.place;state.course=r.course;state.selected=r.names.filter(n=>n&&n!=='―');
 state.scores[scoreKey()]=JSON.parse(JSON.stringify(r.scores));
 saveState();showScore();
}
function deleteHistory(id){
 if(!confirm('この保存データを削除しますか？'))return;
 state.history=state.history.filter(x=>x.id!==id);
 saveState();renderHistory();
}
function monthlyAnalysis(){
 const month=new Date().toISOString().slice(0,7);
 const recs=state.history.filter(r=>r.date.startsWith(month));
 if(!recs.length)return {count:0,avg:'-',best:'-'};
 const vals=[];
 recs.forEach(r=>{
   const idx=0;
   vals.push(r.scores.reduce((s,row)=>s+(row[idx]||0),0));
 });
 return {count:recs.length,avg:(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1),best:Math.min(...vals)};
}

function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
init();
</script>
</body>
