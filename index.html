<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>匝瑳PG スコアカード</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic UI","Meiryo",sans-serif;background:#0b3a27;color:#10291c;overflow:hidden}button,input,select{font-family:inherit}.screen{display:none;height:100dvh;background:#fffdf7}.screen.active{display:flex;flex-direction:column}.home{padding:18px;justify-content:center;background:linear-gradient(#0e5a36,#08281b);color:white;text-align:center}.home h1{font-size:30px;margin:0 0 10px}.homeBox{background:#ffffff22;border:1px solid #ffffff44;border-radius:20px;padding:16px;width:100%;max-width:430px;margin:0 auto}label{display:block;text-align:left;font-size:14px;font-weight:900;margin:10px 0 5px}select,input{width:100%;font-size:20px;padding:13px;border-radius:14px;border:1px solid #b9c8bf;background:white}.bigBtn{width:100%;font-size:23px;font-weight:900;border:0;border-radius:16px;padding:16px;margin-top:16px;background:#fff;color:#123927}.top{height:54px;display:flex;align-items:center;padding:8px;border-bottom:1px solid #d9e2dc;gap:8px;background:white}.top h2{font-size:20px;margin:0;flex:1}.btn{border:0;border-radius:12px;padding:10px 12px;font-size:16px;font-weight:900;background:#edf3ef}.btn.green{background:#0e5a36;color:white}.players{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;background:#f6faf7;border-bottom:1px solid #d9e2dc}.players input{font-size:17px;padding:9px}.tabs{display:flex;gap:8px;padding:8px;overflow-x:auto;background:white}.tabs button{border:1px solid #b9c8bf;border-radius:999px;padding:10px 16px;background:#edf3ef;font-weight:900;font-size:17px;white-space:nowrap}.tabs button.active{background:#0e5a36;color:white}.cardWrap{flex:1;min-height:0;padding:8px;background:#eef4ef}.card{height:100%;background:white;border:2px solid #315b44;border-radius:10px;padding:7px;display:flex;flex-direction:column;overflow:hidden}.cardTitle{display:flex;align-items:center;gap:8px;color:#0e5a36;font-size:20px;font-weight:900;margin-bottom:4px}.info{font-size:12px;color:#315b44;margin-bottom:3px}.tableBox{flex:1;min-height:0}table{border-collapse:collapse;width:100%;height:100%;table-layout:fixed}th,td{border:1px solid #789084;text-align:center;padding:1px}th{background:#f0f6f2;color:#315b44;font-weight:900;font-size:12px}td{font-size:13px}.nameHead{font-size:11px;line-height:1.15}.scoreCell{font-size:20px!important;font-weight:900;background:#fff;cursor:pointer}.scoreCell.empty{color:#d5d5d5}.scoreCell.selected{outline:3px solid #f4cc5d;outline-offset:-3px;background:#fffbea}.total td{font-weight:900;background:#f7faf8}.summary{height:56px;display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 8px;background:white;border-top:1px solid #d9e2dc}.sum{background:#edf5ef;border-radius:8px;text-align:center;font-size:12px;font-weight:900;color:#315b44;padding:4px;line-height:1.25}.help{height:34px;padding:7px 10px;background:#fff7d6;font-size:13px;font-weight:900;color:#315b44}.popup{position:fixed;display:none;z-index:999;left:50%;bottom:10px;transform:translateX(-50%);width:min(94vw,370px);background:white;border:2px solid #0e5a36;border-radius:18px;padding:12px;box-shadow:0 14px 32px #0007}.popupTitle{text-align:center;font-weight:900;color:#315b44;margin-bottom:10px}.pad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.pad button{height:58px;border-radius:14px;border:1px solid #b9c8bf;background:#f8faf8;font-size:25px;font-weight:900}.pad .plus{background:#fff1bf}.pad .clear{background:#ffe4e7;color:#a40012;font-size:17px}@media(min-width:900px){body{overflow:auto}.screen{max-width:620px;margin:auto}}
</style></head><body>
<section id="home" class="screen active home"><div class="homeBox"><h1>匝瑳パークゴルフ場<br>スコアカード</h1><p>明日の試用版：名前選択と簡単スコア入力だけに絞りました。</p><label>プレイヤー1</label><select id="p0"></select><label>プレイヤー2</label><select id="p1"></select><label>プレイヤー3</label><select id="p2"></select><label>プレイヤー4</label><select id="p3"></select><button class="bigBtn" onclick="start()">スコア入力を開始</button></div></section>
<section id="score" class="screen"><div class="top"><h2>スコアカード</h2><button class="btn" onclick="show('home')">名前</button><button class="btn green" onclick="finish()">集計</button></div><div class="players"><input id="n0" oninput="syncName(0)"><input id="n1" oninput="syncName(1)"><input id="n2" oninput="syncName(2)"><input id="n3" oninput="syncName(3)"></div><div class="tabs" id="tabs"></div><div class="cardWrap"><div class="card" id="card"></div></div><div class="summary" id="summary"></div><div class="help">スコア欄をタップ → 1〜4または＋で入力。入力後は次の人へ自動移動。</div></section>
<div class="popup" id="popup"><div class="popupTitle" id="popupTitle">入力</div><div class="pad"><button onclick="setScore(1)">1</button><button onclick="setScore(2)">2</button><button onclick="setScore(3)">3</button><button onclick="setScore(4)">4</button><button class="plus" onclick="plusScore()">＋</button><button onclick="minusScore()">−</button><button class="clear" onclick="clearScore()">消去</button><button onclick="closePop()">閉じる</button></div></div>
<script>
const KEY='sosa_pg_trial_v31';const roster=['山田太郎','佐藤花子','鈴木一郎','田中次郎','高市早苗','橋幸夫','美空ひばり'];const courses=[{name:'あじさいコース',code:'A',dist:[44,73,40,27,54,32,35,29,71],par:[4,6,3,3,4,3,3,3,5]},{name:'くろまつコース',code:'B',dist:[34,48,34,36,52,25,44,31,92],par:[3,5,3,3,4,3,4,3,5]}];let names=['プレイヤー1','プレイヤー2','プレイヤー3','プレイヤー4'];let ci=0,active=null;let scores=blank();function blank(){return courses.map(()=>Array.from({length:9},()=>Array(4).fill('')))}function initRoster(){for(let i=0;i<4;i++){let sel=document.getElementById('p'+i);sel.innerHTML=`<option value="プレイヤー${i+1}">プレイヤー${i+1}</option>`+roster.map(n=>`<option value="${n}">${n}</option>`).join('')}}function load(){initRoster();try{let st=JSON.parse(localStorage.getItem(KEY)||'{}');names=st.names||names;scores=st.scores||scores;ci=st.ci||0}catch(e){}for(let i=0;i<4;i++){document.getElementById('p'+i).value=names[i]}}function save(){localStorage.setItem(KEY,JSON.stringify({names,scores,ci}))}function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');render()}function start(){for(let i=0;i<4;i++){names[i]=document.getElementById('p'+i).value||`プレイヤー${i+1}`;}save();show('score')}function syncName(i){names[i]=document.getElementById('n'+i).value||`プレイヤー${i+1}`;save();render()}function render(){tabs.innerHTML=courses.map((c,i)=>`<button class="${i===ci?'active':''}" onclick="ci=${i};save();render()">${c.name}</button>`).join('');for(let i=0;i<4;i++){let inp=document.getElementById('n'+i);if(inp)inp.value=names[i]}renderCard();renderSummary();save()}function renderCard(){const c=courses[ci],dsum=c.dist.reduce((a,b)=>a+b,0),psum=c.par.reduce((a,b)=>a+b,0);const rows=c.dist.map((d,h)=>`<tr><td>${h+1}</td><td>${c.par[h]}</td><td>${d}</td>${names.map((n,pi)=>`<td class="scoreCell ${scores[ci][h][pi]?'':'empty'}" id="cell_${h}_${pi}" onclick="openPop(${h},${pi})">${scores[ci][h][pi]}</td>`).join('')}</tr>`).join('');card.innerHTML=`<div class="cardTitle">● ${c.name}</div><div class="info">匝瑳パークゴルフ場</div><div class="tableBox"><table><colgroup><col style="width:38px"><col style="width:38px"><col style="width:48px"><col><col><col><col></colgroup><tr><th>ホール</th><th>Par</th><th>距離</th>${names.map(n=>`<th class="nameHead">${esc(n)}</th>`).join('')}</tr>${rows}<tr class="total"><td>計</td><td>${psum}</td><td>${dsum}</td>${names.map((n,pi)=>`<td>${courseTotal(pi)||''}</td>`).join('')}</tr></table></div>`}function openPop(h,pi){active={h,pi};document.querySelectorAll('.selected').forEach(e=>e.classList.remove('selected'));document.getElementById(`cell_${h}_${pi}`).classList.add('selected');popupTitle.textContent=`${h+1}H　${names[pi]}`;popup.style.display='block'}function setScore(n){scores[ci][active.h][active.pi]=n;let nx=next(active);closePop();save();render();if(nx)setTimeout(()=>openPop(nx.h,nx.pi),40)}function plusScore(){let v=Number(scores[ci][active.h][active.pi]||4);scores[ci][active.h][active.pi]=v+1;let nx=next(active);closePop();save();render();if(nx)setTimeout(()=>openPop(nx.h,nx.pi),40)}function minusScore(){let v=Number(scores[ci][active.h][active.pi]||1);scores[ci][active.h][active.pi]=Math.max(1,v-1);closePop();save();render()}function clearScore(){scores[ci][active.h][active.pi]='';closePop();save();render()}function closePop(){popup.style.display='none';active=null}function next(a){if(a.pi<3)return {h:a.h,pi:a.pi+1};if(a.h<8)return {h:a.h+1,pi:0};return null}function courseTotal(pi){return scores[ci].reduce((a,r)=>a+Number(r[pi]||0),0)}function allTotal(pi){return scores.reduce((t,c)=>t+c.reduce((a,r)=>a+Number(r[pi]||0),0),0)}function missing(pi){return scores.reduce((t,c)=>t+c.filter(r=>!r[pi]).length,0)}function renderSummary(){summary.innerHTML=names.map((n,pi)=>`<div class="sum">${esc(n)}<br>合計:${allTotal(pi)} 未:${missing(pi)}</div>`).join('')}function finish(){alert(names.map((n,pi)=>`${n}　合計:${allTotal(pi)}　未入力:${missing(pi)}`).join('\n'))}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}document.addEventListener('click',e=>{if(!popup.contains(e.target)&&!e.target.classList.contains('scoreCell'))closePop()});load();render();
</script></body></html>
